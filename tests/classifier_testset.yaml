# classifier_testset.yaml
# 分類器の評価用テストセット（手動ラベル付き）
#
# 各エントリ:
#   label : 正解ラベル (prepared_tare / self_mix_soy_vinegar / miso_dare /
#            su_kosho / other_local_style / unknown)
#   text  : 評価に使うスニペットテキスト（実際の記事から抜粋 or 代表的な文体を模した合成例）
#
# 追加ルール:
#   - 1ラベルにつき最低5件
#   - ambiguous（複数ラベルのキーワードを含む）ケースも意図的に混ぜる
#   - unknown は「餃子は出てくるがたれ情報なし」の記事を模している

cases:

  # -----------------------------------------------------------------------
  # prepared_tare
  # -----------------------------------------------------------------------
  - label: prepared_tare
    text: >
      餃子が運ばれてきた。卓上には専用タレと辣油が置いてある。
      まずはそのままタレだけでいただく。皮がパリッとして香ばしい。

  - label: prepared_tare
    text: >
      お店オリジナルの特製タレが絶品。ニンニクの風味が効いていて
      これだけでご飯が進む。ラー油を少し足すとさらに美味しい。

  - label: prepared_tare
    text: >
      付属のたれをたっぷりつけて食べるのがここのスタイル。
      秘伝のタレは甘辛く、餃子との相性が抜群だった。

  - label: prepared_tare
    text: >
      ポン酢で食べる水餃子が名物。さっぱりとした酸味が蒸した皮と合う。
      ぽん酢以外の選択肢はなく、これ一択という感じ。

  - label: prepared_tare
    text: >
      テーブルにはたれとラー油だけ。らー油を少量垂らして食べると
      ちょうどよい辛さになる。お店のたれはやや甘めの醤油ベース。

  - label: prepared_tare
    text: >
      餃子の王将のたれは独特の風味があって好きだ。
      他の店のタレとは明らかに違う。店のタレだけで完結している。

  # -----------------------------------------------------------------------
  # self_mix_soy_vinegar
  # -----------------------------------------------------------------------
  - label: self_mix_soy_vinegar
    text: >
      卓上の酢と醤油を自分でブレンドして酢醤油を作る。
      酢醤油で食べるのが東京の下町スタイルだと思っている。

  - label: self_mix_soy_vinegar
    text: >
      お酢と醤油を2:1くらいで割って食べるのが好き。
      卓上酢をたっぷりかけてさっぱりといただく。

  - label: self_mix_soy_vinegar
    text: >
      自分で酢醤油を作るのが楽しみのひとつ。酢じょうゆにラー油を
      一滴落とすだけで全然違う味になる。

  - label: self_mix_soy_vinegar
    text: >
      テーブルの酢と醤油と酢を混ぜて食べる。醤油と酢の黄金比は人それぞれだが
      私は酢多めが好み。割って食べるのが当たり前だと思っていた。

  - label: self_mix_soy_vinegar
    text: >
      酢をかけてから醤油をたらす派。卓上の酢は絶対欠かせない。
      酢しょうゆに自分でブレンドするのが醍醐味。

  - label: self_mix_soy_vinegar
    text: >
      大森の満福では酢醤油を作ることなく酢をドバドバかける流儀があった。
      醤油と酢を自分で混ぜるのではなく酢単体でいく豪快なスタイル。

  # -----------------------------------------------------------------------
  # miso_dare
  # -----------------------------------------------------------------------
  - label: miso_dare
    text: >
      神戸では味噌だれで餃子を食べるのが普通だと聞いていたが
      実際に食べてみると確かに味噌だれが合う。みそだれの甘みがクセになる。

  - label: miso_dare
    text: >
      名古屋の餃子は赤味噌ベースのたれが特徴的。八丁味噌の濃厚なコクが
      餃子の肉汁と合わさって格別の美味しさだった。

  - label: miso_dare
    text: >
      味噌タレを使った餃子専門店。みそタレは自家製で、
      味噌をつけて食べるスタイルは初体験だったが癖になる。

  - label: miso_dare
    text: >
      関西でも神戸エリアは味噌で食べる。味噌をつけながら食べるのが
      地元民にとっては当たり前の食べ方らしい。

  - label: miso_dare
    text: >
      みそだれは甘くてコク深い。赤味噌ベースのたれに少し砂糖が入っているようで
      濃厚な味わいが焼き餃子によく合っていた。

  # -----------------------------------------------------------------------
  # su_kosho
  # -----------------------------------------------------------------------
  - label: su_kosho
    text: >
      酢コショウで食べるのがここの流儀。酢胡椒という組み合わせは
      初めてだったが、さっぱりとした酸味に胡椒の刺激が加わって新鮮だった。

  - label: su_kosho
    text: >
      酢とコショウだけで食べる。醤油は一切使わない。
      酢こしょうのシンプルな組み合わせが餃子の旨味を引き立てる。

  - label: su_kosho
    text: >
      卓上には酢と胡椒が置いてあるだけ。酢コショで食べるスタイルは
      東北地方の一部で見られると聞いた。

  - label: su_kosho
    text: >
      酢をかけてコショウをふるだけのシンプルな食べ方。
      胡椒と酢の組み合わせが思いのほかハマる。

  - label: su_kosho
    text: >
      酢と胡椒だけでいただく餃子。酢こしょうは醤油を使わないので
      皮の味がダイレクトに伝わってくる。

  # -----------------------------------------------------------------------
  # other_local_style
  # -----------------------------------------------------------------------
  - label: other_local_style
    text: >
      マヨネーズをつけて食べる餃子が意外と美味しい。
      マヨとラー油を合わせたソースが絶品だった。

  - label: other_local_style
    text: >
      ゆずこしょうをつけて食べるのがここのスタイル。
      柚子胡椒の清涼感が脂っこさを中和してくれる。

  - label: other_local_style
    text: >
      ごまだれで食べる水餃子が名物。胡麻だれのコクが皮に絡まって
      なんとも言えない美味しさだった。

  - label: other_local_style
    text: >
      ネギ塩たれで食べる餃子。ねぎ塩の塩加減がちょうどよく
      さっぱりいただける。塩だれ系は初体験だった。

  - label: other_local_style
    text: >
      にんにく醤油で食べると格段に美味しくなる。
      ニンニク醤油は自家製で、生姜醤油との2種類が卓上に置いてある。

  - label: other_local_style
    text: >
      豆板醤をたっぷりつけて食べる辛い餃子。XO醤との組み合わせも試してみたが
      トウバンジャン単体のほうが好みだった。

  # -----------------------------------------------------------------------
  # unknown（たれ情報なし）
  # -----------------------------------------------------------------------
  - label: unknown
    text: >
      先日、近所の中華料理屋に行ってきた。餃子を注文したが
      待ち時間が長く少し残念だった。店の雰囲気はよかった。

  - label: unknown
    text: >
      冷凍餃子を買ってきて家で焼いた。フライパンで蒸し焼きにすると
      パリパリになって美味しい。焼き方のコツをようやくつかめた気がする。

  - label: unknown
    text: >
      餃子パーティーをした。皮から手作りして具材を包む作業が楽しかった。
      子どもたちも喜んでくれて大成功だった。

  - label: unknown
    text: >
      宇都宮餃子まつりに行ってきた。いろんな店の餃子を食べ歩き
      どの店も美味しかった。次回もぜひ来たい。

  - label: unknown
    text: >
      餃子は皮が命だと思う。薄皮か厚皮かで食感がまったく変わる。
      今日食べた餃子は皮がモチモチで最高だった。

  # -----------------------------------------------------------------------
  # ambiguous（複数ラベルのキーワードが混在）
  # -----------------------------------------------------------------------
  - label: prepared_tare
    text: >
      お店の特製タレで食べた後、酢醤油も試してみた。
      やはりタレの方が断然美味しかった。特製タレが主役の店だと思う。
    note: prepared_tare優位だがself_mix_soy_vinegarキーワードも含む

  - label: self_mix_soy_vinegar
    text: >
      卓上の酢と醤油を自分で割って食べる。一応たれも置いてあるが
      酢醤油を作る方が断然好きだ。酢しょうゆ派を貫いている。
    note: self_mix_soy_vinegar優位だがprepared_tareのキーワード「たれ」も含む

  - label: miso_dare
    text: >
      味噌だれとタレの両方が卓上にある珍しいお店。
      試してみたらみそだれの方がはるかに合っていた。
    note: miso_dare優位だが「タレ」も含む

  # -----------------------------------------------------------------------
  # hard negatives（キーワードを使わない・迂回表現）
  # ルールベースでは unknown になるが本来は別ラベルが正解
  # → Phase 2 LLM の必要性を示す事例
  # -----------------------------------------------------------------------
  - label: unknown
    expected_failure: true
    note: 本来 self_mix_soy_vinegar だがキーワードなし
    text: >
      店員さんが「卓上のお酢と醤油を好みで合わせてください」と言った。
      2:1くらいにすると丁度いい。これが正解な気がする。

  - label: unknown
    expected_failure: true
    note: 本来 prepared_tare だがキーワードなし
    text: >
      注文すると小皿に茶色い液体が一緒に出てきた。
      甘辛くてニンニクが効いている。これをつけて食べると最高。

  - label: unknown
    expected_failure: true
    note: 本来 miso_dare だがキーワードなし
    text: >
      神戸のあのお店、茶色いドロッとしたソースをつけて食べるんだけど
      何なのかよくわからなかった。豆系の発酵食品っぽい風味だった。

  - label: unknown
    expected_failure: true
    note: 本来 su_kosho だがキーワードなし
    text: >
      酸っぱくてピリッとした液体に浸して食べる。
      透明な酸味のある液体に黒い粒がたくさん浮いていた。
