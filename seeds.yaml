# seeds.yaml — クロール対象URLリスト
#
# source types:
#   html       : 静的HTMLページ（記事・ブログ）
#   rss        : RSSフィードURL（フィードを解析して各記事を取得）
#   api        : JSON APIエンドポイント
#   playwright : JavaScriptが必要なページ（要 playwright）
#
# prefectures: ヒントとなる都道府県名リスト。空なら本文から自動検出。
#
# robots.txt 確認済み: hatena.blog → Allow: /* (Crawl-delay指定なし)
# クロール遅延: DEFAULT_CRAWL_DELAY_SEC = 3.0秒 (config.py)

sources:

  # -----------------------------------------------------------------------
  # 東京都
  # 「餃子ランナー」— 餃子専門ブログ。RSS から最新記事を一括取得。
  # -----------------------------------------------------------------------
  - type: rss
    url: https://ichizo.hatenablog.com/feed
    prefectures: ["東京都"]

  # 大森の町中華「満福」の衝撃タレ流儀（酢ドバドバ）
  - type: html
    url: https://ichizo.hatenablog.com/entry/omori-manpuku-gyoza-ryugi
    prefectures: ["東京都"]

  # -----------------------------------------------------------------------
  # 大阪府 / 関西
  # ぎょうざの満洲の関西店舗には「餃子のたれ」があった
  # -----------------------------------------------------------------------
  - type: html
    url: https://kyotosan.hatenablog.com/entry/2017/08/29/200402
    prefectures: ["大阪府"]

  # -----------------------------------------------------------------------
  # 神奈川県
  # 横浜中華街「山東2号店」の餃子レポート
  # -----------------------------------------------------------------------
  - type: html
    url: https://okuradesu.hatenablog.com/entry/2019/12/29/120500
    prefectures: ["神奈川県"]

  # -----------------------------------------------------------------------
  # 兵庫県（神戸）
  # 「神戸の餃子は味噌だれで食べます」— miso_dare ラベルの典型例
  # -----------------------------------------------------------------------
  - type: html
    url: https://kasagokawahagi.hatenablog.com/entry/2023/08/31/180028
    prefectures: ["兵庫県"]
